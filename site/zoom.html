<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zoomable CMU MechE Family Tree</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #5d6b66;
      --paper: #fbfaf5;
      --accent: #0f766e;
      --tree-base-width: 12000px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Georgia, "Times New Roman", serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(23, 33, 31, 0.12);
      background: rgba(251, 250, 245, 0.94);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
    }
    button,
    .back-link {
      border: 1px solid rgba(23, 33, 31, 0.18);
      border-radius: 999px;
      padding: 0.5rem 0.75rem;
      color: var(--ink);
      background: white;
      box-shadow: 0 4px 14px rgba(23, 33, 31, 0.08);
      font: 700 0.88rem/1 system-ui, sans-serif;
      text-decoration: none;
      cursor: pointer;
    }
    button:hover,
    .back-link:hover {
      border-color: rgba(15, 118, 110, 0.46);
      color: var(--accent);
    }
    .hint {
      width: 100%;
      margin: 0;
      color: var(--muted);
      font: 0.88rem/1.35 system-ui, sans-serif;
    }
    #viewport {
      position: relative;
      height: calc(100vh - 5.25rem);
      min-height: 28rem;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(15, 118, 110, 0.12), transparent 30rem),
        linear-gradient(135deg, rgba(23, 33, 31, 0.06) 25%, transparent 25%) 0 0 / 24px 24px,
        white;
      cursor: grab;
      touch-action: none;
    }
    #viewport.dragging { cursor: grabbing; }
    #tree {
      position: absolute;
      top: 0;
      left: 0;
      width: var(--tree-base-width);
      max-width: none;
      height: auto;
      transform-origin: 0 0;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform;
    }
    @media (max-width: 700px) {
      header { align-items: flex-start; }
      #viewport {
        height: calc(100vh - 8.5rem);
        min-height: 24rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Zoomable CMU MechE Family Tree</h1>
    <div class="controls" aria-label="Zoom controls">
      <a class="back-link" href="index.html">Back</a>
      <button type="button" data-action="out">Zoom out</button>
      <button type="button" data-action="in">Zoom in</button>
      <button type="button" data-action="reset">Reset</button>
    </div>
    <p class="hint">Scroll or pinch to zoom. Drag to pan. Double-click to zoom in.</p>
  </header>
  <main id="viewport" aria-label="Pan and zoom viewport">
    <img id="tree" src="cmu_meche_family_tree.svg" alt="CMU MechE Family Tree">
  </main>
  <script>
    const viewport = document.getElementById("viewport");
    const tree = document.getElementById("tree");
    const pointers = new Map();
    const minScale = 0.04;
    const maxScale = 12;
    let scale = 1;
    let x = 24;
    let y = 24;
    let dragging = false;
    let lastX = 0;
    let lastY = 0;
    let lastPinchDistance = 0;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function render() {
      tree.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    }

    function zoomAt(nextScale, clientX, clientY) {
      const rect = viewport.getBoundingClientRect();
      const pointX = clientX - rect.left;
      const pointY = clientY - rect.top;
      const beforeX = (pointX - x) / scale;
      const beforeY = (pointY - y) / scale;
      scale = clamp(nextScale, minScale, maxScale);
      x = pointX - beforeX * scale;
      y = pointY - beforeY * scale;
      render();
    }

    function getPinchState() {
      const active = [...pointers.values()];
      if (active.length < 2) return null;
      const [a, b] = active;
      const dx = b.clientX - a.clientX;
      const dy = b.clientY - a.clientY;
      return {
        distance: Math.hypot(dx, dy),
        centerX: (a.clientX + b.clientX) / 2,
        centerY: (a.clientY + b.clientY) / 2,
      };
    }

    viewport.addEventListener("wheel", (event) => {
      event.preventDefault();
      const factor = event.deltaY < 0 ? 1.14 : 0.88;
      zoomAt(scale * factor, event.clientX, event.clientY);
    }, { passive: false });

    viewport.addEventListener("pointerdown", (event) => {
      pointers.set(event.pointerId, event);
      dragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
      lastPinchDistance = getPinchState()?.distance || 0;
      viewport.classList.add("dragging");
      viewport.setPointerCapture(event.pointerId);
    });

    viewport.addEventListener("pointermove", (event) => {
      if (!pointers.has(event.pointerId)) return;
      pointers.set(event.pointerId, event);

      const pinch = getPinchState();
      if (pinch) {
        if (lastPinchDistance > 0) {
          zoomAt(scale * (pinch.distance / lastPinchDistance), pinch.centerX, pinch.centerY);
        }
        lastPinchDistance = pinch.distance;
        return;
      }

      if (!dragging) return;
      x += event.clientX - lastX;
      y += event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      render();
    });

    function endPointer(event) {
      pointers.delete(event.pointerId);
      lastPinchDistance = getPinchState()?.distance || 0;
      if (pointers.size === 0) {
        dragging = false;
        viewport.classList.remove("dragging");
      }
      if (viewport.hasPointerCapture(event.pointerId)) {
        viewport.releasePointerCapture(event.pointerId);
      }
    }

    viewport.addEventListener("pointerup", endPointer);
    viewport.addEventListener("pointercancel", endPointer);

    viewport.addEventListener("dblclick", (event) => {
      zoomAt(scale * 1.7, event.clientX, event.clientY);
    });

    document.querySelector("[data-action='in']").addEventListener("click", () => {
      const rect = viewport.getBoundingClientRect();
      zoomAt(scale * 1.25, rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    document.querySelector("[data-action='out']").addEventListener("click", () => {
      const rect = viewport.getBoundingClientRect();
      zoomAt(scale * 0.8, rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    document.querySelector("[data-action='reset']").addEventListener("click", () => {
      fitTreeToViewport();
    });

    function fitTreeToViewport() {
      const rect = viewport.getBoundingClientRect();
      const treeWidth = tree.offsetWidth || 12000;
      const treeHeight = tree.offsetHeight || 6400;
      scale = clamp(
        Math.min((rect.width - 48) / treeWidth, (rect.height - 48) / treeHeight),
        minScale,
        1
      );
      x = Math.max(24, (rect.width - treeWidth * scale) / 2);
      y = Math.max(24, (rect.height - treeHeight * scale) / 2);
      render();
    }

    if (tree.complete) {
      fitTreeToViewport();
    } else {
      tree.addEventListener("load", fitTreeToViewport, { once: true });
    }
  </script>
</body>
</html>
