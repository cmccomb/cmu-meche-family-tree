name: Build and Deploy

permissions:
  contents: read
  pages: write
  id-token: write

# This workflow installs dependencies, generates browser-consumable family
# tree JSON from the configured CSV, and deploys the static explorer through
# the GitHub Pages workflow artifact pipeline.  The workflow expects a
# repository secret named `CSV_URL` containing the URL of the published CSV.

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # rebuild every day at 02:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate family tree data
        env:
          CSV_URL: ${{ secrets.CSV_URL }}
        run: |
          rm -rf docs
          mkdir -p docs
          python make_graph.py \
            --csv "$CSV_URL" \
            --supplemental-csv data/supplemental_lineages.csv \
            --output-json docs/graph-data.json

      - name: Create build marker
        run: |
          cat > docs/build_meta.txt <<EOF
          commit=${{ github.sha }}
          built_at_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
          cp docs/build_meta.txt docs/.build_meta

      - name: Print build meta for diagnostics
        run: cat docs/build_meta.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Create site pages
        run: |
          BUILD_COMMIT=$(awk -F= '$1 == "commit" { print $2 }' docs/build_meta.txt)
          BUILD_AT_UTC=$(awk -F= '$1 == "built_at_utc" { print $2 }' docs/build_meta.txt)
          sed \
            -e "s|__BUILD_COMMIT__|${BUILD_COMMIT}|g" \
            -e "s|__BUILD_AT_UTC__|${BUILD_AT_UTC}|g" \
            site/index.html > docs/index.html
          cp site/app.js site/styles.css site/zoom.html docs/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
