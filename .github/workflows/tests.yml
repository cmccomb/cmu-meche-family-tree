name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          npm ci

      - name: Run JavaScript coverage
        run: npm run coverage:js

      - name: Run Python coverage
        run: npm run coverage:python

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage/python/coverage.xml,./coverage/js/lcov.info
          use_oidc: true
